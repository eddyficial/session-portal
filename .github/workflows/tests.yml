name: Tests

on:
  push:
    branches:
      - main
      - features
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Python tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Codebase\requirements.txt -r requirements-dev.txt

      - name: Run lint
        shell: pwsh
        run: python -m ruff check .

      - name: Run tests
        shell: pwsh
        run: python -m pytest Codebase\v2\tests -q
