name: Tests

on:
  push:
    branches:
      - main
      - features
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Python tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Codebase\requirements.txt -r requirements-dev.txt

      - name: Run lint
        shell: pwsh
        run: python -m ruff check .

      - name: Run tests
        shell: pwsh
        run: python -m pytest Codebase\v2\tests -q --cov=Codebase\v2 --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build release ZIP smoke artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          git archive --format=zip --prefix="SessionPortal-ci/" -o "dist\SessionPortal-ci.zip" HEAD README.md LICENSE SECURITY.md install.ps1 install_desktop_shortcut.ps1 uninstall_desktop_shortcut.ps1 launch_session_portal.bat App Codebase

      - name: Smoke test release ZIP
        shell: pwsh
        run: |
          $extractRoot = Join-Path $env:RUNNER_TEMP "session-portal-zip-smoke"
          if (Test-Path $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          Expand-Archive -LiteralPath "dist\SessionPortal-ci.zip" -DestinationPath $extractRoot -Force
          Push-Location (Join-Path $extractRoot "SessionPortal-ci")
          try {
            python -m pytest Codebase\v2\tests -q
            python -m compileall Codebase\v2 -q
            python -c "from Codebase.v2.main import main; from Codebase.v2.providers.registry import PROVIDERS; print('zip smoke ok', len(PROVIDERS))"
          } finally {
            Pop-Location
          }

      - name: Upload release ZIP smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: session-portal-ci-zip
          path: dist/SessionPortal-ci.zip
