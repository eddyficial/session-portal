<?xml version="1.0" encoding="UTF-8"?>
<!-- Session Portal logo: compact portal-door mark.
     The app keeps its readable dark UI; the icon borrows the reference
     wordmark's electric violet/blue glow and open-door metaphor. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11111b"/>
      <stop offset="1" stop-color="#070810"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="0.45" stop-color="#8f96b7"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#59628e"/>
      <stop offset="1" stop-color="#1c2444"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="236" height="236" rx="48" fill="url(#tile)" stroke="#303452" stroke-width="2"/>

  <path d="M70 212 L70 114 C70 78 94 58 128 58 C162 58 188 78 188 114 L188 212"
        fill="none" stroke="#9b42ff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.6" filter="url(#glow)"/>
  <path d="M70 212 L70 114 C70 78 94 58 128 58 C162 58 188 78 188 114 L188 212"
        fill="none" stroke="url(#metal)" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M70 212 L70 114 C70 78 94 58 128 58 C162 58 188 78 188 114 L188 212"
        fill="none" stroke="#9b42ff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M70 212 L70 114 C70 78 94 58 128 58 C162 58 188 78 188 114 L188 212"
        fill="none" stroke="#1da8ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M96 214 L96 124 C96 100 110 86 128 86 C146 86 160 100 160 124 L160 214 Z" fill="#090a16"/>

  <polygon points="146,100 180,84 182,204 146,218" fill="url(#door)" stroke="#bbc5e5" stroke-width="2"/>
  <rect x="168" y="142" width="4" height="17" rx="2" fill="#43ddff"/>

  <polygon points="104,214 158,214 190,236 72,236" fill="#122a5b"/>
  <path d="M117 214 L100 236 M130 214 L131 236 M143 214 L162 236" stroke="#9b42ff" stroke-width="2"/>
  <path d="M84 221 H178 M84 228 H178" stroke="#1da8ff" stroke-width="2"/>
  <path d="M42 190 C70 236 174 250 222 154" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.25"/>
</svg>
