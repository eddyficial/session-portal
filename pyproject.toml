[tool.pytest.ini_options]
testpaths = ["Codebase/v2/tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
  ".git",
  ".pytest_cache",
  "__pycache__",
  "Codebase/v2/.trash",
  "Codebase/v2/audits",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

